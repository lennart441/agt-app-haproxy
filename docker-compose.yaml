# Unified HAProxy + Coraza WAF + Geo-Manager for all nodes.
# Differentiate per server via .env: NODE_NAME, NODE_PRIO, MESH_NODES, ANCHOR_IPS, GEO_SOURCE_URL.

services:
  haproxy:
    build:
      context: .
      dockerfile: haproxy/Dockerfile
    image: haproxy:3.2-alpine
    container_name: haproxy_gateway

    environment:
      - NODE_NAME=${NODE_NAME:-agt-1}
      - MESH_NODES=${MESH_NODES:-172.20.0.1,172.20.0.2,172.20.0.3}
      - CLUSTER_MAXCONN=${CLUSTER_MAXCONN:-200}
      - GEO_ALLOWED_COUNTRIES=${GEO_ALLOWED_COUNTRIES:-DE,AT,CH,FR,IT,LU,BE,NL}
      - STATS_USER=${STATS_USER:-admin}
      - STATS_PASSWORD=${STATS_PASSWORD:-change-me}

    entrypoint: ["sh", "/docker-entrypoint.sh"]
    command: ["haproxy", "-f", "/tmp/haproxy.cfg"]

    ports:
      - "80:80"
      - "443:443"
      - "50000:50000"
      - "8404:8404"

    volumes:
      - ./conf/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./scripts/haproxy-docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./ssl:/etc/ssl/certs:ro
      - ./conf/errors:/usr/local/etc/haproxy/errors:ro
      - ./conf/coraza.cfg:/usr/local/etc/haproxy/coraza.cfg:ro
      - ./conf/coraza-spoa.yaml:/etc/coraza-spoa/config.yaml:ro
      - ./conf/maps:/usr/local/etc/haproxy/maps
      - haproxy-stat:/var/run/haproxy-stat

    sysctls:
      net.ipv4.ip_unprivileged_port_start: 0

    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/tmp/haproxy.cfg"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

    stop_grace_period: 30s

    restart: always
    depends_on:
      coraza-spoa:
        condition: service_started
      cert-manager:
        condition: service_started

    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M

    networks:
      - security-net

  coraza-spoa:
    build:
      context: .
      dockerfile: coraza/Dockerfile.coraza
    container_name: coraza-spoa
    command: ["-config", "/etc/coraza-spoa/config.yaml"]
    stop_grace_period: 15s
    volumes:
      - ./conf/coraza-spoa.yaml:/etc/coraza-spoa/config.yaml:ro
      - ./coraza/rules:/etc/coraza-spoa/rules:ro
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
    networks:
      security-net:
        aliases:
          - coraza-spoa

  geo-manager:
    build:
      context: .
      dockerfile: geo-manager/Dockerfile
    container_name: geo-manager
    depends_on:
      haproxy:
        condition: service_started
    # Für lokalen Test: Geo-Quelle vom Host (z. B. python -m http.server in conf/test-data)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    environment:
      - NODE_NAME=${NODE_NAME:-agt-1}
      - NODE_PRIO=${NODE_PRIO:-1}
      - CLUSTER_MAXCONN=${CLUSTER_MAXCONN:-200}
      - MESH_NODES=${MESH_NODES:-}
      - ANCHOR_IPS=${ANCHOR_IPS:-}
      - GEO_ALLOWED_COUNTRIES=${GEO_ALLOWED_COUNTRIES:-DE,AT,CH,FR,IT,LU,BE,NL}
      - GEO_SOURCE_URL=${GEO_SOURCE_URL:-}
      - GEO_SOURCE_IPV6_URL=${GEO_SOURCE_IPV6_URL:-}
      - GEO_BLOCKS_URL=${GEO_BLOCKS_URL:-}
      - GEO_LOCATIONS_URL=${GEO_LOCATIONS_URL:-}
      - GEO_BLOCKS_IPV6_URL=${GEO_BLOCKS_IPV6_URL:-}
      - MAP_DIR=/usr/local/etc/haproxy/maps
      - HAPROXY_CFG_PATH=/usr/local/etc/haproxy/haproxy.cfg
      - HAPROXY_SOCKET=/var/run/haproxy-stat/socket
      # Für haproxy -c (Syntax-Check): Zertifikat unter diesem Pfad (ssl separat gemountet, /etc/ssl/certs = CA-Bundle)
      - HAPROXY_CRT_PATH_FOR_VALIDATION=/etc/ssl/haproxy-pem/haproxy.pem
      - STAGE_DELAY_PRIO2_HOURS=${STAGE_DELAY_PRIO2_HOURS:-48}
      - STAGE_DELAY_PRIO3_HOURS=${STAGE_DELAY_PRIO3_HOURS:-96}
      - FETCH_INTERVAL_HOURS=${FETCH_INTERVAL_HOURS:-24}
      - FETCH_RETRIES=${FETCH_RETRIES:-3}
      - FETCH_RETRY_DELAY_SEC=${FETCH_RETRY_DELAY_SEC:-60}
      - GEO_STATUS_PORT=8080
      - SIZE_DEVIATION_THRESHOLD=${SIZE_DEVIATION_THRESHOLD:-0.9}
      - GEO_FAIL_OPEN_MIN_ENTRIES=${GEO_FAIL_OPEN_MIN_ENTRIES:-50}
      - BUILD_NICE_LEVEL=${BUILD_NICE_LEVEL:-10}
      - BUILD_CHUNK_SIZE=${BUILD_CHUNK_SIZE:-5000}
      - BUILD_SLEEP_AFTER_CHUNK_MS=${BUILD_SLEEP_AFTER_CHUNK_MS:-50}
      - MAIL_ENABLED=${MAIL_ENABLED:-false}
      - MAIL_HOST=${MAIL_HOST:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USE_TLS=${MAIL_USE_TLS:-true}
      - MAIL_USER=${MAIL_USER:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_FROM=${MAIL_FROM:-}
      - MAIL_TO=${MAIL_TO:-}
      - CLUSTER_HEALTH_INTERVAL_HOURS=${CLUSTER_HEALTH_INTERVAL_HOURS:-168}
      - CLUSTER_HEALTH_TIMEOUT_SEC=${CLUSTER_HEALTH_TIMEOUT_SEC:-5}
    volumes:
      - ./conf/maps:/usr/local/etc/haproxy/maps
      - ./conf/test-data:/data:ro
      - ./conf/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./conf/errors:/usr/local/etc/haproxy/errors:ro
      - ./conf/coraza.cfg:/usr/local/etc/haproxy/coraza.cfg:ro
      # ssl nur unter /etc/ssl/haproxy-pem (nicht /etc/ssl/certs), damit CA-Bundle für HTTPS-Downloads erhalten bleibt
      - ./ssl:/etc/ssl/haproxy-pem:ro
      - haproxy-stat:/var/run/haproxy-stat
    ports:
      - "8080:8080"
    stop_grace_period: 15s
    restart: always
    networks:
      - security-net

  cert-manager:
    build:
      context: .
      dockerfile: cert-manager/Dockerfile
    container_name: cert-manager
    # Kein depends_on: startet zuerst, schreibt auf Master sofort ssl/haproxy.pem; HAProxy wartet auf cert-manager
    environment:
      - NODE_NAME=${NODE_NAME:-agt-1}
      - NODE_PRIO=${NODE_PRIO:-1}
      - MESH_NODES=${MESH_NODES:-}
      - CERT_IS_MASTER=${CERT_IS_MASTER:-false}
      - CERT_CLUSTER_KEY=${CERT_CLUSTER_KEY:-}
      - CERT_STATUS_PORT=${CERT_STATUS_PORT:-8081}
      # Standard: Mount von CERT_LE_DIR_HOST ist /certs im Container
      - CERT_SOURCE_FULLCHAIN=${CERT_SOURCE_FULLCHAIN:-/certs/fullchain.pem}
      - CERT_SOURCE_PRIVKEY=${CERT_SOURCE_PRIVKEY:-/certs/privkey.pem}
      - CERT_TARGET_PEM_PATH=${CERT_TARGET_PEM_PATH:-/etc/ssl/certs/haproxy.pem}
      - CERT_STAGE_DELAY_PRIO2_HOURS=${CERT_STAGE_DELAY_PRIO2_HOURS:-1}
      - CERT_STAGE_DELAY_PRIO3_HOURS=${CERT_STAGE_DELAY_PRIO3_HOURS:-2}
      - CERT_POLL_INTERVAL_SECONDS=${CERT_POLL_INTERVAL_SECONDS:-300}
    volumes:
      - ./ssl:/etc/ssl/certs
      # Let's Encrypt: CERT_LE_BASE_HOST=/etc/letsencrypt mounten, damit live/<domain>/ Symlinks
      # auf archive/<domain>/ im Container auflösen. Ohne BASE nur CERT_LE_DIR_HOST (live/domain).
      - ${CERT_LE_BASE_HOST:-${CERT_LE_DIR_HOST:-/etc/letsencrypt/live/example.org}}:/certs:ro
    stop_grace_period: 15s
    restart: always
    networks:
      - security-net

networks:
  security-net: {}

# Named Volume für Stats-Socket (HAProxy + Geo-Manager). Entrypoint setzt Rechte (chown/chmod), HAProxy läuft per setpriv als 99.
volumes:
  haproxy-stat:
