defaults
   mode http
   log global
   timeout connect 5s
   timeout client  30s
   timeout server  30s
   timeout http-request 15s
   errorfile 403 /usr/local/etc/haproxy/errors/403.http
   errorfile 503 /usr/local/etc/haproxy/errors/503.http
   errorfile 429 /usr/local/etc/haproxy/errors/429-rate-limit.http
