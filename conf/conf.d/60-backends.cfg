   server agt-2 __MESH_IP_2__:3114 check
   server agt-3 __MESH_IP_3__:3114 check

backend client_backend_apache
   option forwardfor
   option httpchk GET /index.html
   balance roundrobin
   server agt-1 __MESH_IP_1__:3101 check
   server agt-2 __MESH_IP_2__:3101 check
   server agt-3 __MESH_IP_3__:3101 check

backend dashboard_backend_apache
