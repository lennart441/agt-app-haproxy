# Applikations-Backends. Server-IPs werden über __MESH_IP_*__ vom Entrypoint ersetzt (MESH_NODES).

backend website_backend
   balance roundrobin
   http-request set-path /website%[path]
   option httpchk GET /index.html
   server agt-1 __MESH_IP_1__:3102 check
   server agt-2 __MESH_IP_2__:3102 check
   server agt-3 __MESH_IP_3__:3102 check

backend api_backend_sync
   option forwardfor
   option httpchk GET /v3/sync-api/ready
   http-check expect string ready
   balance leastconn
   server agt-1 __MESH_IP_1__:3111 check
   server agt-2 __MESH_IP_2__:3111 check
   server agt-3 __MESH_IP_3__:3111 check

backend api_backend_report
   option forwardfor
   option httpchk GET /v3/report/ready
   http-check expect string ready
   balance leastconn
   server agt-1 __MESH_IP_1__:3112 check
   server agt-2 __MESH_IP_2__:3112 check
   server agt-3 __MESH_IP_3__:3112 check

backend api_backend_primaer
   option forwardfor
   option httpchk GET /v3/pri-api/ready
   http-check expect rstring (?i)ready
   balance leastconn
   server agt-1 __MESH_IP_1__:3113 check
   server agt-2 __MESH_IP_2__:3113 check
   server agt-3 __MESH_IP_3__:3113 check

