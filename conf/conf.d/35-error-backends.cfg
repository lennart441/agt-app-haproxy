# 403 bei Geo-Block: eigenes Backend mit 403-geo.http.
# 403 bei WAF/Coraza-Block: Backend be_403_waf mit 403-waf.http.
# Allgemeine 403 (sonstige) nutzt defaults errorfile.
# Dummy-Server zeigt auf lokalen Prometheus-Exporter (:8404), damit Backend "up" ist;
# die Anfrage wird durch http-request deny beantwortet, der Server wird nie angefragt.

backend be_403_geo
   mode http
   errorfile 403 /usr/local/etc/haproxy/errors/403-geo.http
   http-request deny deny_status 403
   server dummy 127.0.0.1:8404 check inter 10s

backend be_403_waf
   mode http
   errorfile 403 /usr/local/etc/haproxy/errors/403-waf.http
   http-request deny deny_status 403
   server dummy 127.0.0.1:8404 check inter 10s

backend backend_404_error
   mode http
   errorfile 404 /usr/local/etc/haproxy/errors/404.http
   http-request deny deny_status 404
   server dummy 127.0.0.1:8404 check inter 10s
