frontend http_in
   bind :80

   # Clusterweites Verbindungslimit
   http-request track-sc1 str(global) table st_global_conn
   acl too_many_conn sc1_conn_cur(st_global_conn) ge __CLUSTER_MAXCONN__
   http-request deny deny_status 503 if too_many_conn

   # Geo-Check vor Redirect → eigene 403-Seite (403-geo.http)
   http-request set-var(txn.country) src,map_ip(/usr/local/etc/haproxy/maps/geo.map,XX)
   acl is_allowed_geo_http var(txn.country) -m reg -i __GEO_ALLOWED_COUNTRIES_REGEX__
   acl is_whitelisted_http src,map_ip(/usr/local/etc/haproxy/maps/whitelist.map) -m found
   http-request redirect scheme https code 301 if is_allowed_geo_http or is_whitelisted_http
   use_backend be_403_geo if !is_allowed_geo_http !is_whitelisted_http
