# Stick-Table-Backends (müssen vor den Frontends stehen, die sie referenzieren).
# Alle Tabellen werden über Peers cluster-weit synchronisiert (global über alle Knoten).
# Zeitfenster und Limits entsprechen den API-seitigen Rate-Limits.
# Siehe: Dokumentationen/Rate-Limiting.md

backend st_global_conn
   stick-table type string len 10 size 1 expire 5m store conn_cur peers agt_cluster

# Sync-API: 1500 req / 300s pro IP
backend st_rl_api_sync
   stick-table type ipv6 size 100k expire 310s store http_req_rate(300s) peers agt_cluster

# AGT-Get-API: 20 req / 300s pro IP
backend st_rl_api_get
   stick-table type ipv6 size 100k expire 310s store http_req_rate(300s) peers agt_cluster

# Report-API: 10 req / 60s pro IP
backend st_rl_api_report
   stick-table type ipv6 size 100k expire 70s store http_req_rate(60s) peers agt_cluster

# Primaer-API Standard (eingeloggt): 120 req / 300s pro IP
backend st_rl_api_primaer
   stick-table type ipv6 size 100k expire 310s store http_req_rate(300s) peers agt_cluster

# Primaer-API request-code: 30 req / 300s pro IP
backend st_rl_api_primaer_reqcode
   stick-table type ipv6 size 100k expire 310s store http_req_rate(300s) peers agt_cluster

# Primaer-API verify-code: 20 req / 600s pro IP
backend st_rl_api_primaer_verify
   stick-table type ipv6 size 100k expire 610s store http_req_rate(600s) peers agt_cluster

# Primaer-API request-code: 1 req / 120s pro Mail-Adresse
# Schlüssel: X-Rate-Email Header (vom Dashboard/Client gesendet, von HAProxy nach Tracking entfernt).
backend st_rl_api_primaer_reqcode_mail
   stick-table type string len 254 size 50k expire 130s store http_req_rate(120s) peers agt_cluster

# Primaer-API verify-code: 5 req / 600s pro Mail-Adresse
backend st_rl_api_primaer_verify_mail
   stick-table type string len 254 size 50k expire 610s store http_req_rate(600s) peers agt_cluster

# Health/Ready-Monitoring: 100 req / 60s pro IP (eigenes Limit, nicht im Standard-Rate-Limit).
# Uptime Kuma erzeugt ca. 9 req/min cluster-weit; 100/60s = ~1000 % Puffer.
backend st_rl_health
   stick-table type ipv6 size 100k expire 70s store http_req_rate(60s) peers agt_cluster

# Website: 2000 req/s pro IP (statische Inhalte)
backend st_rl_website
   stick-table type ipv6 size 100k expire 10s store http_req_rate(1s) peers agt_cluster

# Client: 2000 req/s pro IP (statische Inhalte)
backend st_rl_client
   stick-table type ipv6 size 100k expire 10s store http_req_rate(1s) peers agt_cluster

# Globaler Backend-Überlastungsschutz: Zählt ALLE Requests pro Backend (nicht pro IP).
# Schlüssel ist der Backend-Name (z.B. "api_sync"), nicht die Quell-IP.
backend st_overload
   stick-table type string len 32 size 10 expire 10s store http_req_rate(1s) peers agt_cluster

backend st_waf_blocks
   stick-table type ipv6 size 100k expire 1h peers agt_cluster store gpc0
