global
   # localpeer: __NODE_NAME__ wird beim Container-Start durch NODE_NAME ersetzt.
   localpeer __NODE_NAME__
   nbthread 2
   log stdout format raw local0 info
   user haproxy
   group haproxy
   # maxconn hoch; echtes Cluster-Limit über Stick-Table st_global_conn (conn_cur, Peers-Aggregation)
   maxconn 25000
   tune.ssl.default-dh-param 2048
   stats socket /var/run/haproxy-stat/socket mode 660 level admin
   stats timeout 30s

# Cluster-Synchronisation für Stick-Tables (WAF Auto-Ban). Lokaler Peer ohne IP, andere mit IP:50000 (Entrypoint ersetzt aus MESH_NODES/NODE_NAME).
peers agt_cluster
   bind :50000
   server agt-1 172.20.0.1:50000
   server agt-2 172.20.0.2:50000
   server agt-3 172.20.0.3:50000

resolvers docker
   nameserver dns1 127.0.0.11:53
   resolve_retries 3
   timeout resolve 1s
   timeout retry   1s
   hold valid      10s

defaults
   mode http
   log global
   timeout connect 5s
   timeout client  30s
   timeout server  30s
   timeout http-request 15s
   errorfile 503 /usr/local/etc/haproxy/errors/503.http
   errorfile 429 /usr/local/etc/haproxy/errors/429-rate-limit.http

# ----------------------------------------------------------------------
# Frontends
# ----------------------------------------------------------------------
frontend http_in
   bind :80
   # Clusterweites Verbindungslimit (Stick-Table mit Key "global", über Peers summiert)
   http-request track-sc1 str(global) table st_global_conn
   acl too_many_conn sc1_conn_cur(0) ge __CLUSTER_MAXCONN__
   http-request deny deny_status 503 if too_many_conn
   # Geo-Check vor Redirect (Repo: nur erlaubte Regionen kommen bis HTTPS)
   http-request set-var(txn.country) src,map_ip(/usr/local/etc/haproxy/maps/geo.map,XX)
   acl is_allowed_geo_http var(txn.country) -m reg -i (DE|AT|CH|FR|IT|LU|BE|NL)
   acl is_whitelisted_http src,map_ip(/usr/local/etc/haproxy/maps/whitelist.map) -m found
   http-request deny deny_status 403 if !is_allowed_geo_http !is_whitelisted_http
   http-request redirect scheme https code 301

# WARNUNG Produktion: Stats-URI nicht im Repo dokumentieren, Zugangsdaten nur über ENV.
# Siehe Dokumentationen/Sicherheitsbewertung.md. Zugriff z. B. auf 127.0.0.1 beschränken.
frontend stats
   mode http
   bind 127.0.0.1:56708
   stats enable
   stats refresh 10s
   stats uri /kM3liYHB
   stats show-modules
   stats admin if TRUE
   stats auth ${STATS_USER}:${STATS_PASSWORD}

frontend prometheus
   bind :8404
   mode http
   http-request use-service prometheus-exporter if { path /metrics }

frontend https_in
   bind :443 ssl crt /etc/ssl/certs/haproxy.pem

   # Header Management (wie Prod)
   http-request del-header X-Real-IP
   http-request set-header X-Real-IP %[src]
   capture request header X-Trace-ID len 64
   capture request header User-Agent len 256

   # Clusterweites Verbindungslimit (Stick-Table mit Key "global", über Peers summiert)
   http-request track-sc1 str(global) table st_global_conn
   acl too_many_conn sc1_conn_cur(0) ge __CLUSTER_MAXCONN__
   http-request deny deny_status 503 if too_many_conn

   # Per-Backend Rate Limits (Requests/Sekunde, clusterweit über Peers)
   # agt-get-api: 50 RPS
   http-request track-sc2 src table st_rl_api_get if host_api path_get_api
   acl rl_api_get_exceeded sc2_http_req_rate(0) gt 50
   http-request deny deny_status 429 if rl_api_get_exceeded

   # sync-api: 200 RPS
   http-request track-sc2 src table st_rl_api_sync if host_api path_sync_api
   acl rl_api_sync_exceeded sc2_http_req_rate(0) gt 200
   http-request deny deny_status 429 if rl_api_sync_exceeded

   # report-api: 25 RPS
   http-request track-sc2 src table st_rl_api_report if host_api path_report_api
   acl rl_api_report_exceeded sc2_http_req_rate(0) gt 25
   http-request deny deny_status 429 if rl_api_report_exceeded

   # primär-api: 300 RPS
   http-request track-sc2 src table st_rl_api_primaer if host_api path_primaer_api
   acl rl_api_primaer_exceeded sc2_http_req_rate(0) gt 300
   http-request deny deny_status 429 if rl_api_primaer_exceeded

   # Website (inkl. Dashboard): 2000 RPS
   http-request track-sc2 src table st_rl_website if host_website
   acl rl_website_exceeded sc2_http_req_rate(0) gt 2000
   http-request deny deny_status 429 if rl_website_exceeded

   # Client-Apache: 2000 RPS
   http-request track-sc2 src table st_rl_client if host_client
   acl rl_client_exceeded sc2_http_req_rate(0) gt 2000
   http-request deny deny_status 429 if rl_client_exceeded

   # Geo-Check: IP gegen Map (vor WAF). Default 'XX' = blockiert.
   http-request set-var(txn.country) src,map_ip(/usr/local/etc/haproxy/maps/geo.map,XX)
   acl is_allowed_geo var(txn.country) -m reg -i (DE|AT|CH|FR|IT|LU|BE|NL)
   acl is_whitelisted src,map_ip(/usr/local/etc/haproxy/maps/whitelist.map) -m found
   http-request deny deny_status 403 if !is_allowed_geo !is_whitelisted

   # --- WAF & AUTO-BAN (Stick-Table über Peers synchronisiert) ---
   acl internal_networks src 172.16.0.0/12 10.0.0.0/8 127.0.0.1
   tcp-request connection track-sc0 src table st_waf_blocks
   tcp-request connection reject if { sc0_get_gpc0(st_waf_blocks) gt 0 } !internal_networks
   filter spoe engine coraza config /usr/local/etc/haproxy/coraza.cfg
   http-request sc-inc-gpc0(0) if { var(txn.coraza.action) -m str deny } !internal_networks
   http-request deny deny_status 403 if { var(txn.coraza.action) -m str deny }

   log-format '{"client_ip":"%ci","timestamp":"%t","method":"%HM","path":"%HP","proto":"%HV","status":%ST,"bytes_read":%B,"duration_ms":%Tr,"termination_state":"%ts","trace_id":"%[capture.req.hdr(0)]","user_agent":"%[capture.req.hdr(1)]"}'

   # Routing ACLs (host_api: Repo akzeptiert alle Knoten-Hosts; Prod ggf. nur eigener Host pro Knoten)
   acl host_api       hdr(host) -i agt-1.agt-app.de -i agt-2.agt-app.de -i agt-3.agt-app.de
   acl host_client    hdr(host) -i client.agt-app.de
   acl host_website   hdr(host) -i agt-app.de

   acl path_sync_api     path_beg /v3/sync-api
   acl path_report_api   path_beg /v3/report
   acl path_primaer_api  path_beg /v3/pri-api
   acl path_get_api      path_beg /v3/agt-get-api
   acl path_dashboard    path_beg /dashboard

   use_backend dashboard_backend_apache if host_website path_dashboard
   use_backend website_backend          if host_website
   use_backend api_backend_sync         if host_api path_sync_api
   use_backend api_backend_report      if host_api path_report_api
   use_backend api_backend_primaer     if host_api path_primaer_api
   use_backend api_backend_get         if host_api path_get_api
   use_backend client_backend_apache   if host_client

   default_backend backend_404_error

# ----------------------------------------------------------------------
# Backends
# ----------------------------------------------------------------------
backend website_backend
   balance roundrobin
   http-request set-path /website%[path]
   option httpchk GET /index.html
   server agt-1 172.20.0.1:3102 check
   server agt-2 172.20.0.2:3102 check
   server agt-3 172.20.0.3:3102 check

backend api_backend_sync
   option forwardfor
   option httpchk GET /v3/sync-api/ready
   http-check expect string ready
   balance leastconn
   server agt-1 172.20.0.1:3111 check
   server agt-2 172.20.0.2:3111 check
   server agt-3 172.20.0.3:3111 check

backend api_backend_report
   option forwardfor
   option httpchk GET /v3/report/ready
   http-check expect string ready
   balance leastconn
   server agt-1 172.20.0.1:3112 check
   server agt-2 172.20.0.2:3112 check
   server agt-3 172.20.0.3:3112 check

backend api_backend_primaer
   option forwardfor
   option httpchk GET /v3/pri-api/ready
   http-check expect rstring (?i)ready
   balance leastconn
   server agt-1 172.20.0.1:3113 check
   server agt-2 172.20.0.2:3113 check
   server agt-3 172.20.0.3:3113 check

backend api_backend_get
   option forwardfor
   option httpchk GET /v3/agt-get-api/ready
   http-check expect string ready
   balance leastconn
   server agt-1 172.20.0.1:3114 check
   server agt-2 172.20.0.2:3114 check
   server agt-3 172.20.0.3:3114 check

backend client_backend_apache
   option forwardfor
   option httpchk GET /index.html
   balance roundrobin
   server agt-1 172.20.0.1:3101 check
   server agt-2 172.20.0.2:3101 check
   server agt-3 172.20.0.3:3101 check

backend dashboard_backend_apache
   option forwardfor
   option httpchk GET /index.html
   balance roundrobin
   server agt-1 172.20.0.1:3102 check
   server agt-2 172.20.0.2:3102 check
   server agt-3 172.20.0.3:3102 check

backend coraza-spoa
   mode tcp
   server s1 coraza-spoa:9000 check

backend backend_404_error
   errorfile 404 /usr/local/etc/haproxy/errors/404.http

backend st_global_conn
   # Ein Key "global" → conn_cur wird über Peers summiert = echtes Cluster-Limit
   stick-table type string len 10 size 1 expire 5m store conn_cur peers agt_cluster

backend st_rl_api_get
   # Rate-Limit agt-get-api: 50 RPS (http_req_rate(1s)), clusterweit über Peers
   stick-table type ip size 100k expire 10s store http_req_rate(1s) peers agt_cluster

backend st_rl_api_sync
   # Rate-Limit sync-api: 200 RPS
   stick-table type ip size 100k expire 10s store http_req_rate(1s) peers agt_cluster

backend st_rl_api_report
   # Rate-Limit report-api: 25 RPS
   stick-table type ip size 100k expire 10s store http_req_rate(1s) peers agt_cluster

backend st_rl_api_primaer
   # Rate-Limit primär-api: 300 RPS
   stick-table type ip size 100k expire 10s store http_req_rate(1s) peers agt_cluster

backend st_rl_website
   # Rate-Limit Website (inkl. Dashboard): 2000 RPS
   stick-table type ip size 100k expire 10s store http_req_rate(1s) peers agt_cluster

backend st_rl_client
   # Rate-Limit Client-Apache: 2000 RPS
   stick-table type ip size 100k expire 10s store http_req_rate(1s) peers agt_cluster

backend st_global_conn
   # Ein Key "global" → conn_cur wird über Peers summiert = echtes Cluster-Limit
   stick-table type string len 10 size 1 expire 5m store conn_cur peers agt_cluster

backend st_waf_blocks
   stick-table type ip size 100k expire 1h peers agt_cluster store gpc0
