# Projekt-spezifische WAF-Anpassungen.
# Nur diese Dateien bearbeiten; CRS-Dateien im Submodule coraza/rules/coreruleset/ nicht anfassen.
#
# Beispiele:
# - SecRuleRemoveById 942100   (CRS-Regel deaktivieren)
# - Eigene SecRule ...         (zusätzliche Prüfungen)

# -----------------------------------------------------------------------
# HTTP-Methoden: DELETE (und PUT, PATCH) für REST-APIs erlauben
# CRS 911100 erlaubt standardmäßig nur GET, HEAD, POST, OPTIONS.
# Die APIs nutzen DELETE (z. B. /v3/pri-api/tokens/…) und sind app-seitig
# abgesichert. Wir ersetzen die CRS-Regel durch eine eigene mit erweitertem
# Methodenset (eine globale Ausnahme, keine pfadspezifischen Regeln).
# -----------------------------------------------------------------------
SecRuleRemoveById 911100
SecRule REQUEST_METHOD "!@within GET HEAD POST OPTIONS PUT PATCH DELETE" \
  "id:911101,phase:1,deny,status:403,log,tag:'OWASP_CRS',msg:'Method not allowed by policy'"
